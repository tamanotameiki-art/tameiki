const CACHE_KEY  = "tameiki_archive_v2";
const CACHE_TTL  = 3600 * 1000; // 1時間

// ===== ローディング終了 =====
document.addEventListener("DOMContentLoaded", () => {
  setTimeout(() => {
    document.getElementById("loading").classList.add("done");
  }, 800);
});

// ===== 星を生成 =====
(function() {
  const container = document.getElementById("stars");
  for (let i = 0; i < 80; i++) {
    const star = document.createElement("div");
    star.className = "star";
    const size = Math.random() * 2 + .5;
    star.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s; --del:${Math.random()*5}s;
      --op:${.15+Math.random()*.5};
    `;
    container.appendChild(star);
  }
})();

// ===== ナビのスクロール制御 =====
const nav = document.getElementById("nav");
window.addEventListener("scroll", () => {
  nav.classList.toggle("scrolled", window.scrollY > 60);
}, { passive: true });

// ===== スクロールリビール =====
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      revealObserver.unobserve(e.target);
    }
  });
}, { threshold: 0.12, rootMargin: "0px 0px -40px 0px" });

document.querySelectorAll("[data-reveal]").forEach(el => {
  el.classList.add("reveal");
  revealObserver.observe(el);
});

// ===== データ取得 =====
let allPosts = [];
let displayCount = 9;

async function fetchHistory() {
  // キャッシュチェック
  try {
    const cached = sessionStorage.getItem(CACHE_KEY);
    if (cached) {
      const { data, ts } = JSON.parse(cached);
      if (Date.now() - ts < CACHE_TTL) return data;
    }
  } catch {}

  try {
    const res  = await fetch(SHEET_HISTORY_CSV);
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0];
    const posts = rows.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => obj[h] = row[i] || "");
      return obj;
    }).filter(p => p["詩"]).reverse(); // 新しい順

    sessionStorage.setItem(CACHE_KEY, JSON.stringify({ data: posts, ts: Date.now() }));
    return posts;
  } catch (e) {
    console.warn("データ取得失敗:", e);
    return [];
  }
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split("\n");
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let cell = "", inQuote = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuote && line[i+1] === '"') { cell += '"'; i++; }
        else inQuote = !inQuote;
      } else if (ch === "," && !inQuote) {
        row.push(cell); cell = "";
      } else {
        cell += ch;
      }
    }
    row.push(cell);
    rows.push(row);
  }
  return rows;
}

// ===== ベスト作品を表示 =====
function renderBest(posts) {
  if (!posts.length) return;

  // 全SNS再生数合計が最大の投稿を探す
  const best = posts.slice(0, 30).reduce((best, post) => {
    const plays = (parseInt(post["X再生数"]||0) + parseInt(post["YouTube再生数"]||0) + parseInt(post["Instagram再生数"]||0));
    const bestPlays = (parseInt(best["X再生数"]||0) + parseInt(best["YouTube再生数"]||0) + parseInt(best["Instagram再生数"]||0));
    return plays > bestPlays ? post : best;
  }, posts[0]);

  // YouTube動画埋め込み
  const ytId = best["YouTube投稿ID"];
  const videoWrap = document.getElementById("bestVideoWrap");
  if (ytId) {
    videoWrap.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=0&mute=1&playsinline=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;"></iframe>`;
  }

  document.getElementById("bestPoemText").textContent = best["詩"] || "";

  const totalPlays = (parseInt(best["X再生数"]||0) + parseInt(best["YouTube再生数"]||0) + parseInt(best["Instagram再生数"]||0)).toLocaleString();
  document.getElementById("bestMeta").innerHTML = `
    ${best["投稿日時"]?.slice(0,10) || ""}<br>
    フィルター：${best["フィルター"] || ""}<br>
    総再生数：${totalPlays}
  `;

  // リビールのトリガー
  setTimeout(() => {
    document.getElementById("bestPoem").classList.add("visible");
    document.getElementById("bestVideoWrap").classList.add("visible");
  }, 100);
}

// ===== アーカイブを表示 =====
function renderArchive(posts, from, to) {
  const grid = document.getElementById("archiveGrid");
  const slice = posts.slice(from, to);

  slice.forEach((post, i) => {
    const card = document.createElement("div");
    card.className = "archive-card";
    card.style.transitionDelay = `${(i % 3) * 0.08}s`;

    const poem    = post["詩"] || "";
    const date    = post["投稿日時"]?.slice(0,10) || "";
    const filter  = post["フィルター"] || "";
    const ytId    = post["YouTube投稿ID"] || "";
    const plays   = (parseInt(post["X再生数"]||0) + parseInt(post["YouTube再生数"]||0)).toLocaleString();

    card.innerHTML = `
      <div class="card-thumb">
        ${ytId
          ? `<img src="https://img.youtube.com/vi/${ytId}/mqdefault.jpg" alt="" loading="lazy">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(144,112,80,.3);font-size:.65rem;letter-spacing:.2em;">no image</div>`
        }
        ${filter ? `<div class="card-filter-badge">${filter}</div>` : ""}
      </div>
      <div class="card-body">
        <div class="card-poem">${poem.replace(/\n/g,"<br>")}</div>
        <div class="card-date">${date}</div>
        <div class="card-stats">
          <div class="card-stat"><span>▶</span>${plays}</div>
        </div>
      </div>
    `;

    card.addEventListener("click", () => openModal(post));
    grid.appendChild(card);

    // リビール
    requestAnimationFrame(() => {
      revealObserver.observe(card);
    });
  });

  // もっと見るボタン
  document.getElementById("loadMoreBtn").style.display =
    to >= posts.length ? "none" : "inline-block";
}

function loadMore() {
  const prev = displayCount;
  displayCount += 9;
  renderArchive(allPosts, prev, displayCount);
}

function openModal(post) {
  const modal = document.getElementById("modal");
  const ytId  = post["YouTube投稿ID"] || "";

  if (ytId) {
    document.getElementById("modalVideo").src = "";
    document.getElementById("modalVideo").parentElement.innerHTML =
      `<iframe src="https://www.youtube.com/embed/${ytId}?autoplay=1&mute=0&playsinline=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%;height:100%;"></iframe>`;
  }

  document.getElementById("modalPoem").textContent = post["詩"] || "";

  const totalPlays = (parseInt(post["X再生数"]||0)+parseInt(post["YouTube再生数"]||0)+parseInt(post["Instagram再生数"]||0)).toLocaleString();
  document.getElementById("modalInfo").innerHTML = `
    ${post["投稿日時"]?.slice(0,10) || ""}<br>
    フィルター：${post["フィルター"] || ""}<br>
    BGM：${post["BGMタイトル"] || "—"}<br>
    総再生数：${totalPlays}<br><br>
    ${post["YouTube投稿ID"] ? `<a href="https://youtube.com/shorts/${post["YouTube投稿ID"]}" target="_blank" style="color:var(--amber);text-decoration:none;font-size:.65rem;letter-spacing:.2em;">YouTubeで見る →</a>` : ""}
  `;

  modal.classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
  // 動画停止
  const iframe = document.querySelector("#modal iframe");
  if (iframe) iframe.src = iframe.src;
}

document.getElementById("modal").addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
});
