name: たまのためいき。翌朝静止画投稿

on:
  schedule:
    # 毎日9:00 JST (0:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

jobs:
  morning_post:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: pip install google-auth google-api-python-client requests

      - name: YouTube コミュニティ投稿
        env:
          YOUTUBE_CREDENTIALS: ${{ secrets.YOUTUBE_CREDENTIALS }}
          GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python3 scripts/post_morning.py --platform youtube_community

      - name: Instagram フィード投稿
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_ACCOUNT_ID:   ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          GOOGLE_CREDENTIALS:     ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python3 scripts/post_morning.py --platform instagram_feed

      - name: Pinterest 投稿
        env:
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          GOOGLE_CREDENTIALS:     ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python3 scripts/post_morning.py --platform pinterest
