name: たまのためいき。BGMマスタリング

on:
  workflow_dispatch:
    inputs:
      file_id:
        description: 'Google Drive ファイルID（省略時は自動バッチ）'
        required: false
      file_name:
        description: 'ファイル名（省略時は自動バッチ）'
        required: false
      row:
        description: 'スプレッドシートの行番号（省略時は自動バッチ）'
        required: false
  schedule:
    - cron: '0 15 * * *'  # 毎日 0:00 JST

jobs:
  mastering:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存ライブラリをインストール
        run: |
          sudo apt-get install -y ffmpeg
          pip install \
            numpy \
            librosa soundfile \
            requests \
            google-auth google-api-python-client \
            noisereduce

      - name: マスタリング待ちを自動検出＆実行
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          FILE_ID: ${{ inputs.file_id }}
          FILE_NAME: ${{ inputs.file_name }}
          SHEET_ROW: ${{ inputs.row }}
        run: |
          python3 scripts/bgm_mastering_batch.py 2>&1 | tee /tmp/mastering_log.txt

      - name: マスタリング完了を通知
        run: |
          echo "BGMマスタリングバッチ完了"
          cat /tmp/mastering_log.txt | tail -20
