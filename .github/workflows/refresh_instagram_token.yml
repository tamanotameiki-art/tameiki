name: Refresh Instagram Token

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Instagram Access Token
        id: refresh
        run: |
          RESPONSE=$(curl -s "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "Response: $RESPONSE"
          NEW_TOKEN=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['access_token'])")
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT

      - name: Update GitHub Secret
        uses: gliech/create-github-secret-action@v1
        with:
          name: INSTAGRAM_ACCESS_TOKEN
          value: ${{ steps.refresh.outputs.new_token }}
          pa_token: ${{ secrets.GH_TOKEN }}